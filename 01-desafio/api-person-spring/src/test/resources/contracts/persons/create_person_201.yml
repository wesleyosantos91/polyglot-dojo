description: "POST /api/persons — cria uma nova pessoa e retorna 201 com Location"
request:
  method: POST
  url: /api/persons
  headers:
    Content-Type: application/json
  body:
    name: "Wesley Santos"
    email: "contract@example.com"
    birthDate: "1991-01-15"
  matchers:
    body:
      - path: $.name
        type: by_regex
        value: ".+"
      - path: $.email
        type: by_regex
        value: ".+@.+"
      - path: $.birthDate
        type: by_date

response:
  status: 201
  headers:
    Content-Type: application/json
    Location: "http://localhost/api/persons/00000000-0000-0000-0000-000000000001"
  body:
    id: "00000000-0000-0000-0000-000000000001"
    name: "Wesley Santos"
    email: "contract@example.com"
    birthDate: "1991-01-15"
    createdAt: "2026-01-01T00:00:00Z"
    updatedAt: null
  matchers:
    headers:
      - key: Location
        regex: "http://.*"
    body:
      - path: $.id
        type: by_regex
        value: "[0-9a-f-]{36}"
      - path: $.createdAt
        type: by_regex
        value: ".+"
